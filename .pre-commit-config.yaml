repos:
  - repo: local
    hooks:
      - id: lint
        name: lint
        entry: make lint
        language: system
        pass_filenames: false
      - id: format
        name: format
        entry: make fmt
        language: system
        pass_filenames: false
      - id: validate
        name: validate
        entry: make validate
        language: system
        pass_filenames: false
