---
openbao_operator_user: ubuntu
openbao_container_user: openbao
openbao_image: "openbao/openbao:2.2.0"
openbao_ui_port: 8200
openbao_cluster_port: 8201
openbao_tls_cn: >-
  {{ lookup('env', 'PLATFORM_OPENBAO_TLS_CN')
     | default('openbao.example.com', true) }}
openbao_api_addr: "https://{{ ansible_host }}:{{ openbao_ui_port }}"
